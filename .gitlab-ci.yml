sonarqube-check:
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache   
  script:
       - pwd
       - whoami
       - echo ${CI_PROJECT_DIR}
       - echo ${CI_JOB_NAME}
       - echo "***********************************************************"
       - cd ${CI_PROJECT_DIR}
       - echo "*************************************************************"
       - npm -v
       - node -v
       - unset JAVA_TOOL_OPTIONS
       - JAVA_TOOL_OPTIONS=""
       - echo "*************************************************************"
       - echo ${JAVA_TOOL_OPTIONS}
       - echo "************************************************************"
       - sonar-scanner
       - tar -czvf analysis_report.tar.gz ${CI_PROJECT_DIR}/path/to/analysis_report

  artifacts:
    paths:
       - analysis_report.tar.gz
      # Or analysis_report.zip
  
  allow_failure: true
  only:
    - main
